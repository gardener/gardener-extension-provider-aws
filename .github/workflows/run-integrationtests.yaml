name: Integration-Tests
description: |
  Runs Integrationtests using TestMachinery

on:
  push:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest-static-ip
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: gardener/cc-utils/.github/actions/setup-testrunner@master
      - uses: azure/setup-kubectl@v4
      - uses: gardener/cc-utils/.github/actions/trusted-checkout@master
      - name: trigger-test
        run: |
          set -eu

          gh_token="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          auth_token=$(curl -sLS \
            -H "Authorization: Bearer ${gh_token}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=gardener" \
             | jq .value
            )

          if [ -z "${auth_token}" ]; then
            echo "failed to retrieve an auth-token"
            exit 1
          else
            echo "successfully retrieved an auth-token"
          fi

          # hack: generate kubectl (let us refactor after successful test)
          cat <<EOF > kubeconfig.yaml
          apiVersion: v1
          clusters:
          - cluster:
              server: https://api.tm-os-opensource.core.shoot.canary.k8s-hana.ondemand.com
              certificate-authority-data: 
            name: cluster
          contexts:
          - context:
              cluster: cluster
              user: gha
            name: gha
          current-context: gha
          kind: Config
          preferences: {}
          users:
          - name: gha
            user:
              token: ${auth_token}
          EOF

          testrunner run  \
            --tm-kubeconfig-path=$PWD/kubeconfig.yaml \
            --no-execution-group \
            --testrun-prefix tm-extension-aws \
            --timeout=7200 \
            --testruns-chart-path=.ci/testruns/default \
            --set revision="$(git rev-parse @)"
